<!DOCTYPE html>
<html>
<head>
<title>FD vs Mutual Fund</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #F5F7FA;
    color: #334155;
}

.header {
    background: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.logo {
    height: 45px;
}

.nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #334155;
}

.hero {
    text-align: center;
    margin-top: 60px;
}

.highlight {
    color: #2FA4A9;
}

.card {
    background: white;
    width: 420px;
    margin: 40px auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input, select {
    width: 95%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #2FA4A9;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
}

button:hover {
    background: #248b8f;
}
</style>

</head>

<body>

<div class="header">
    <img src="/static/logo.png" class="logo">
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<div class="hero">
    <h1>See your money grow <span class="highlight">smarter</span></h1>
</div>

<div class="card">
<form action="/result" method="POST">

<input type="text" name="name" placeholder="Your Name" required>
<input type="number" name="phone" placeholder="Phone Number" required>

<input type="number" name="amount" placeholder="Enter Amount" required>
<input type="number" step="0.1" name="rate" placeholder="FD Interest Rate (%)" required>
<input type="number" name="years" placeholder="Years" required>

<select name="risk" required>
<option value="">Select Risk</option>
<option value="low">Conservative</option>
<option value="medium">Moderate</option>
<option value="high">Aggressive</option>
</select>

<button type="submit">Compare Now</button>

</form>
</div>

<hr>

<div id="contact" style="text-align:center; padding:30px;">
<h2>Contact Us</h2>
<p>📞 8433726774</p>
<p>📧 invest@sagefarm.in</p>

<a href="https://wa.me/918433726774">
<button style="background:#25D366;">Chat on WhatsApp</button>
</a>
</div>

</body>
</html>
